<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南昌龙门吊监控中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4d 50%, #0a0e27 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 顶部标题区 - 严格对称 */
        .header {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
            transition: all 0.5s ease;
        }

        .header.hidden { display: none; }

        .header::before,
        .header::after {
            content: '';
            position: absolute;
            top: 65px;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #38bdf8, transparent);
        }

        .header::before { left: 50%; transform: translateX(-180px); }
        .header::after { right: 50%; transform: translateX(180px); }

        .header-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #38bdf8, #818cf8, #38bdf8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .header .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .header .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .timestamp {
            color: #475569;
            font-size: 0.85rem;
            margin-top: 12px;
            font-family: 'Courier New', monospace;
        }

        /* 主容器 - 严格对称网格 */
        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 24px;
            flex: 1;
            transition: all 0.5s ease;
        }

        .container.hidden { display: none; }

        /* 卡片样式 */
        .card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.5), transparent);
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(56, 189, 248, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .card:hover::before {
            width: 100%;
            transition: width 0.4s ease;
        }

        .card-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: rgba(56, 189, 248, 0.1);
            position: absolute;
            top: 10px;
            right: 20px;
            line-height: 1;
            font-family: 'Courier New', monospace;
        }

        .card-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(99, 102, 241, 0.2));
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card:hover .card-icon {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.4), rgba(99, 102, 241, 0.4));
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e2e8f0;
            letter-spacing: 1px;
        }

        .card .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
            margin-bottom: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .card .desc {
            color: #64748b;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* iframe 容器 */
        .iframe-wrapper {
            width: 100%;
            max-width: 1200px;
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 0 20px 20px;
            animation: fadeIn 0.5s ease;
        }

        .iframe-wrapper.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 返回按钮栏 */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            margin-bottom: 10px;
        }

        .toolbar-title {
            font-size: 1.1rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-title .crane-name {
            color: #38bdf8;
            font-weight: 600;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(99, 102, 241, 0.2));
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 10px;
            color: #38bdf8;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.3), rgba(99, 102, 241, 0.3));
            border-color: rgba(56, 189, 248, 0.6);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transform: translateX(-2px);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .back-btn:hover svg {
            transform: translateX(-3px);
        }

        /* iframe 本身 */
        .iframe-box {
            flex: 1;
            width: 100%;
            min-height: 70vh;
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.5);
            overflow: hidden;
            position: relative;
        }

        .iframe-box iframe {
            width: 100%;
            height: 100%;
            min-height: 70vh;
            border: none;
            display: block;
        }

        /* iframe 加载提示 */
        .iframe-loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.9);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .iframe-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(56, 189, 248, 0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .iframe-loading p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .open-external {
            padding: 8px 20px;
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            color: #38bdf8;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .open-external:hover {
            background: rgba(56, 189, 248, 0.25);
        }

        /* 底部 - 对称 */
        .footer {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            padding: 30px 20px 40px;
            color: #475569;
            font-size: 0.8rem;
            position: relative;
            transition: all 0.5s ease;
        }

        .footer.hidden { display: none; }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100, 116, 139, 0.5), transparent);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, auto);
                gap: 16px;
                padding: 16px;
            }

            .header h1 {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }

            .header::before,
            .header::after {
                display: none;
            }

            .card {
                padding: 30px 20px;
            }

            .toolbar {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .iframe-box {
                min-height: 60vh;
            }

            .iframe-box iframe {
                min-height: 60vh;
            }
        }
    </style>
</head>
<body>
    <!-- 主界面 -->
    <div class="header" id="mainHeader">
        <span class="header-icon">🏗️</span>
        <h1>南昌龙门吊监控中心</h1>
        <div class="subtitle">睿郅云设备可视化平台 · 实时监控</div>
        <div class="divider"></div>
        <div class="timestamp" id="timestamp"></div>
    </div>

    <div class="container" id="mainContainer">
        <div class="card" onclick="openCrane('https://iot.aqjkpt.com/overview?token=ee2ed19fea5de4e20e980e125bd64368', '南昌 1-5# 龙门吊')">
            <span class="card-number">01</span>
            <div class="card-icon">🚢</div>
            <h2>南昌 1-5# 龙门吊</h2>
            <span class="status"><span class="status-dot"></span>在线监控</span>
            <div class="desc">设备运行状态 / 报警信息 / 实时数据</div>
        </div>

        <div class="card" onclick="openCrane('https://iot.aqjkpt.com/overview?token=081da8f1c128fdf67c96941ceaf6f826', '南昌 2-5# 龙门吊')">
            <span class="card-number">02</span>
            <div class="card-icon">🚢</div>
            <h2>南昌 2-5# 龙门吊</h2>
            <span class="status"><span class="status-dot"></span>在线监控</span>
            <div class="desc">设备运行状态 / 报警信息 / 实时数据</div>
        </div>

        <div class="card" onclick="openCrane('https://iot.aqjkpt.com/overview?token=b64c913107a6cadb1cb2fb4998a96382', '南昌 3-5# 龙门吊')">
            <span class="card-number">03</span>
            <div class="card-icon">🚢</div>
            <h2>南昌 3-5# 龙门吊</h2>
            <span class="status"><span class="status-dot"></span>在线监控</span>
            <div class="desc">设备运行状态 / 报警信息 / 实时数据</div>
        </div>

        <div class="card" onclick="openCrane('https://iot.aqjkpt.com/overview?token=6b2e7c622760deedb3d354e6eeaeb10c', '南昌 4-5# 龙门吊')">
            <span class="card-number">04</span>
            <div class="card-icon">🚢</div>
            <h2>南昌 4-5# 龙门吊</h2>
            <span class="status"><span class="status-dot"></span>在线监控</span>
            <div class="desc">设备运行状态 / 报警信息 / 实时数据</div>
        </div>
    </div>

    <!-- iframe 嵌入区 -->
    <div class="iframe-wrapper" id="iframeWrapper">
        <div class="toolbar">
            <div class="toolbar-title">
                当前监控：<span class="crane-name" id="currentCraneName">--</span>
            </div>
            <a class="back-btn" onclick="backToHome()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                返回主界面
            </a>
        </div>
        <div class="iframe-box">
            <div class="iframe-loading" id="iframeLoading">
                <div class="spinner"></div>
                <p>正在加载监控平台...</p>
                <a class="open-external" id="externalLink" href="#" target="_blank">新窗口打开</a>
            </div>
            <iframe id="craneIframe" src="" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        </div>
    </div>

    <div class="footer" id="mainFooter">
        数据来源：睿郅云设备可视化平台 (iot.aqjkpt.com)
    </div>

    <script>
        // 时间更新
        function updateTime() {
            const now = new Date();
            const str = now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            document.getElementById('timestamp').textContent = str;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 打开龙门吊监控
        function openCrane(url, name) {
            // 隐藏主界面
            document.getElementById('mainHeader').classList.add('hidden');
            document.getElementById('mainContainer').classList.add('hidden');
            document.getElementById('mainFooter').classList.add('hidden');

            // 显示 iframe 区
            document.getElementById('iframeWrapper').classList.add('active');
            document.getElementById('currentCraneName').textContent = name;
            document.getElementById('externalLink').href = url;

            // 显示加载动画
            document.getElementById('iframeLoading').classList.remove('hidden');

            // 加载 iframe
            const iframe = document.getElementById('craneIframe');
            iframe.src = url;

            // 5秒后隐藏加载动画（如果页面加载慢）
            setTimeout(() => {
                document.getElementById('iframeLoading').classList.add('hidden');
            }, 5000);
        }

        // 返回主界面
        function backToHome() {
            // 清空 iframe
            document.getElementById('craneIframe').src = '';

            // 隐藏 iframe 区
            document.getElementById('iframeWrapper').classList.remove('active');

            // 显示主界面
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
            document.getElementById('mainFooter').classList.remove('hidden');
        }
    </script>
</body>
</html>
