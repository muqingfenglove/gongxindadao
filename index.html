<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南昌龙门吊监控中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4d 50%, #0a0e27 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
        }

        .header::before,
        .header::after {
            content: '';
            position: absolute;
            top: 65px;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #38bdf8, transparent);
        }

        .header::before { left: 50%; transform: translateX(-180px); }
        .header::after { right: 50%; transform: translateX(180px); }

        .header-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #38bdf8, #818cf8, #38bdf8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .header .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .header .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .timestamp {
            color: #475569;
            font-size: 0.85rem;
            margin-top: 12px;
            font-family: 'Courier New', monospace;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 24px;
            flex: 1;
        }

        .card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.5), transparent);
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(56, 189, 248, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .card:hover::before {
            width: 100%;
            transition: width 0.4s ease;
        }

        .card-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: rgba(56, 189, 248, 0.1);
            position: absolute;
            top: 10px;
            right: 20px;
            line-height: 1;
            font-family: 'Courier New', monospace;
        }

        .card-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(99, 102, 241, 0.2));
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card:hover .card-icon {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.4), rgba(99, 102, 241, 0.4));
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e2e8f0;
            letter-spacing: 1px;
        }

        .card .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
            margin-bottom: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .card .desc {
            color: #64748b;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .footer {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            padding: 30px 20px 40px;
            color: #475569;
            font-size: 0.8rem;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100, 116, 139, 0.5), transparent);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, auto);
                gap: 16px;
                padding: 16px;
            }

            .header h1 {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }

            .header::before,
            .header::after {
                display: none;
            }

            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">

        <a class="card" href="https://iot.aqjkpt.com/overview?token=081da8f1c128fdf67c96941ceaf6f826" target="_blank" rel="noopener">

            <div class="card-icon">🚢</div>

            <span class="status"><span class="status-dot"></span>在线监控</span>
            <div class="desc">设备运行状态 / 报警信息 / 实时数据</div>
        </a>

        <a class="card" href="https://iot.aqjkpt.com/overview?token=b64c913107a6cadb1cb2fb4998a96382" target="_blank" rel="noopener">
            <span class="card-number">03</span>
            <div class="card-icon">🚢</div>
            <h2>南昌龙门吊3</h2>

            <div class="desc">设备运行状态 / 报警信息 / 实时数据</div>
        </a>

        <a class="card" href="https://iot.aqjkpt.com/overview?token=6b2e7c622760deedb3d354e6eeaeb10c" target="_blank" rel="noopener">

    <div class="footer">

    <script>
        function updateTime() {
            const now = new Date();
            const str = now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            document.getElementById('timestamp').textContent = str;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
